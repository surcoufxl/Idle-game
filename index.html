<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incremental Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Incremental Game</h1>
    <div class="stats">
      <div><span class="label">Coins:</span> <span id="coins">0</span></div>
      <div><span class="label">Per sec:</span> <span id="cps">0</span></div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Click</h2>
      <button id="clickBtn" class="big">+<span id="clickPower">1</span> coin</button>
      <p class="hint">Tip: buy generators to earn coins automatically.</p>
    </section>

    <section class="panel">
      <h2>Generators</h2>
      <div id="shop"></div>
    </section>

    <section class="panel">
      <h2>Upgrades</h2>
      <div id="upgrades"></div>
    </section>
  </main>

  <footer class="footer">
    <button id="saveBtn">Save</button>
    <button id="resetBtn" class="danger">Reset</button>
    <span id="saveStatus" class="status"></span>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
