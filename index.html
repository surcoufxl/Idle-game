<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incremental Skills Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Incremental Skills Game</h1>
    <div class="stats">
      <div><span class="label">Copper ore:</span> <span id="coins">0</span></div>
      <div><span class="label">Running:</span> <span id="cps">—</span></div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Skills</h2>
      <div id="skills"></div>
    </section>

    <section class="panel">
      <h2>Inventory</h2>
      <div id="inventory"></div>
    </section>

    <section class="panel">
      <h2>Action</h2>
      <div id="action"></div>

      <button id="clickBtn" class="big" style="margin-top: 12px;">
        Do action (+<span id="clickPower">1</span>)
      </button>
    </section>
  </main>

  <footer class="footer">
    <button id="saveBtn">Save</button>
    <button id="resetBtn" class="danger">Reset</button>
    <span id="saveStatus" class="status"></span>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
